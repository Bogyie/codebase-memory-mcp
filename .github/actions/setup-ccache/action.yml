name: Setup ccache
description: Configure compiler wrappers and a platform-scoped persistent cache

inputs:
  platform:
    description: Stable platform identifier used to isolate incompatible toolchains
    required: true
  profile:
    description: Build profile such as test, prod, prod-static, or asan
    required: true

runs:
  using: composite
  steps:
    - name: Configure ccache environment (Unix)
      if: runner.os != 'Windows'
      shell: bash
      env:
        CACHE_DIR: ${{ github.workspace }}/.ccache
        CACHE_BASEDIR: ${{ github.workspace }}
      run: |
        set -euo pipefail
        if [ "$RUNNER_OS" = "macOS" ]; then
          echo "$(brew --prefix ccache)/libexec" >> "$GITHUB_PATH"
        else
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
        fi
        {
          echo "CCACHE_DIR=$CACHE_DIR"
          echo "CCACHE_BASEDIR=$CACHE_BASEDIR"
          echo "CCACHE_COMPILERCHECK=content"
        } >> "$GITHUB_ENV"

    - name: Configure ccache environment (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      env:
        CACHE_DIR: ${{ github.workspace }}/.ccache
        CACHE_BASEDIR: ${{ github.workspace }}
      run: |
        set -euo pipefail
        # The Marketplace action executes ccache through Git for Windows sh.
        # Keep the real executable beside its MSYS2 runtime DLLs while the
        # action restores/configures the cache; compiler masquerade wrappers
        # are activated only after that step.
        cygpath -w "$MINGW_PREFIX/bin" >> "$GITHUB_PATH"
        {
          echo "CCACHE_DIR=$CACHE_DIR"
          echo "CCACHE_BASEDIR=$CACHE_BASEDIR"
          echo "CCACHE_COMPILERCHECK=content"
        } >> "$GITHUB_ENV"

    # The action owns restore/save, timestamped immutable keys, cache pruning,
    # and post-job statistics. Pin the exact audited v1.2.23 commit: Marketplace
    # actions are third-party code and tags are mutable.
    - name: Restore ccache
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
      with:
        key: v1-${{ inputs.platform }}-${{ inputs.profile }}
        restore-keys: |
          v1-${{ inputs.platform }}-${{ inputs.profile }}
        max-size: 500M
        install: no
        append-timestamp: true
        evict-old-files: job
        verbose: 1
        job-summary: ccache — ${{ inputs.platform }} / ${{ inputs.profile }}

    - name: Activate ccache compiler wrappers (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: cygpath -w "$MINGW_PREFIX/lib/ccache/bin" >> "$GITHUB_PATH"

    - name: Verify ccache compiler wrappers (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        set -euo pipefail
        ccache --version | head -1
        compiler=$(command -v clang)
        case "$compiler" in
          "$MINGW_PREFIX/lib/ccache/bin/"*) ;;
          *) echo "clang does not resolve through ccache: $compiler" >&2; exit 1 ;;
        esac
