name: Nightly Broad Validation

on:
  schedule:
    - cron: "17 17 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-broad-validation
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/_test.yml
    with:
      skip_perf: false
      broad_platforms: true
      profile: full
