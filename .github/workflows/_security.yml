# Reusable: security-static + CodeQL gate.
# Runs as a separate reusable job group. Whether it blocks later jobs depends
# on the caller; release workflows make it a publication prerequisite.
name: Security Gate

on:
  workflow_call: {}

permissions:
  actions: read
  contents: read
  security-events: read

jobs:
  security-static:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: "Layer 1: Static allow-list audit"
        run: scripts/security-audit.sh
      - name: "Layer 6: UI security audit"
        run: scripts/security-ui.sh
      - name: "Layer 8: Vendored dependency integrity"
        run: scripts/security-vendored.sh

  license-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install ScanCode Toolkit
        run: pipx install scancode-toolkit
      - name: "Gate self-test (a planted violation must be detected)"
        run: scripts/license-gate.sh --selftest
      - name: "License compliance gate (one finding fails)"
        run: scripts/license-gate.sh
      - name: "License provenance audit (byte-identity vs upstream)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/audit-license-provenance.py

  codeql-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Wait for CodeQL on current commit (max 45 min)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On pull_request events github.sha is the synthetic merge commit;
          # CodeQL runs are recorded against the PR head SHA.
          CURRENT_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "Waiting for CodeQL to complete on $CURRENT_SHA..."
          for attempt in $(seq 1 90); do
            LATEST=$(gh api "repos/${{ github.repository }}/actions/workflows/codeql.yml/runs?head_sha=$CURRENT_SHA&per_page=1" \
              --jq '.workflow_runs[] | "\(.conclusion) \(.status)"' 2>/dev/null | head -1 || echo "")
            if [ -z "$LATEST" ]; then
              echo "  $attempt/90: no run yet..."; sleep 30; continue
            fi
            CONCLUSION=$(echo "$LATEST" | cut -d' ' -f1)
            STATUS=$(echo "$LATEST" | cut -d' ' -f2)
            if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
              echo "=== CodeQL passed ==="; exit 0
            elif [ "$STATUS" = "completed" ]; then
              echo "BLOCKED: CodeQL $CONCLUSION"; exit 1
            fi
            echo "  $attempt/90: $STATUS..."; sleep 30
          done
          echo "BLOCKED: CodeQL timeout"; exit 1

      - name: Check for open first-party CodeQL alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          ANALYSIS_SHA: ${{ github.sha }}
        run: |
          echo "Waiting 60s for alert API to settle..."
          sleep 60
          API='repos/${{ github.repository }}/code-scanning/alerts?state=open&tool_name=CodeQL&per_page=100'
          if ! JSON=$(gh api --paginate --slurp "$API"); then
            echo "BLOCKED: unable to read code scanning alerts" >&2
            exit 1
          fi
          ALERTS=$(jq --arg head "$CURRENT_SHA" --arg analysis "$ANALYSIS_SHA" '[.[][] | select(.most_recent_instance.commit_sha == $head or .most_recent_instance.commit_sha == $analysis) | select(.most_recent_instance.location.path | startswith("internal/cbm/vendored/") | not)] | length' <<<"$JSON")
          sleep 15
          if ! JSON2=$(gh api --paginate --slurp "$API"); then
            echo "BLOCKED: unable to re-read code scanning alerts" >&2
            exit 1
          fi
          ALERTS2=$(jq --arg head "$CURRENT_SHA" --arg analysis "$ANALYSIS_SHA" '[.[][] | select(.most_recent_instance.commit_sha == $head or .most_recent_instance.commit_sha == $analysis) | select(.most_recent_instance.location.path | startswith("internal/cbm/vendored/") | not)] | length' <<<"$JSON2")
          [ "$ALERTS" -lt "$ALERTS2" ] && ALERTS=$ALERTS2
          if [ "$ALERTS" -gt 0 ]; then
            echo "BLOCKED: $ALERTS open first-party CodeQL alert(s) on $CURRENT_SHA"
            jq -r --arg head "$CURRENT_SHA" --arg analysis "$ANALYSIS_SHA" '.[][] | select(.most_recent_instance.commit_sha == $head or .most_recent_instance.commit_sha == $analysis) | select(.most_recent_instance.location.path | startswith("internal/cbm/vendored/") | not) | "  #\(.number) [\(.rule.security_severity_level // .rule.severity)] \(.rule.id) — \(.most_recent_instance.location.path):\(.most_recent_instance.location.start_line)"' <<<"$JSON2"
            exit 1
          fi
          echo "=== CodeQL gate passed (0 open first-party alerts on $CURRENT_SHA) ==="
