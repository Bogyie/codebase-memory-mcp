# Reusable sanitizer test workflow. Each platform builds its runner once; suite
# shards then reuse that exact binary instead of recompiling the entire codebase.
name: Test

on:
  workflow_call:
    inputs:
      skip_perf:
        description: 'Skip incremental perf tests (phases 2-7)'
        type: boolean
        default: true
      broad_platforms:
        description: 'Add older glibc and extra OS versions'
        type: boolean
        default: false
      profile:
        description: 'pr runs full suites on Linux only; full runs them everywhere'
        type: string
        default: full

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      platforms: ${{ steps.matrix.outputs.platforms }}
      run_platforms: ${{ steps.matrix.outputs.run_platforms }}
      shards: ${{ steps.matrix.outputs.shards }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute platform and suite matrices
        id: matrix
        env:
          BROAD: ${{ inputs.broad_platforms }}
          PROFILE: ${{ inputs.profile }}
        run: |
          CORE='[
            {"key":"ubuntu-x64","os":"ubuntu-latest","kind":"unix","cc":"gcc","cxx":"g++","sanitize":""},
            {"key":"ubuntu-arm64","os":"ubuntu-24.04-arm","kind":"unix","cc":"gcc","cxx":"g++","sanitize":""},
            {"key":"macos-arm64","os":"macos-14","kind":"unix","cc":"cc","cxx":"c++","sanitize":""},
            {"key":"macos-x64","os":"macos-15-intel","kind":"unix","cc":"cc","cxx":"c++","sanitize":""},
            {"key":"windows-x64","os":"windows-latest","kind":"windows","cc":"clang","cxx":"clang++","msystem":"CLANG64","pkg":"x86_64","sanitize":""}
          ]'
          EXTRA='[
            {"key":"ubuntu22-x64","os":"ubuntu-22.04","kind":"unix","cc":"gcc","cxx":"g++","sanitize":""},
            {"key":"ubuntu22-arm64","os":"ubuntu-22.04-arm","kind":"unix","cc":"gcc","cxx":"g++","sanitize":""},
            {"key":"macos15-arm64","os":"macos-15","kind":"unix","cc":"cc","cxx":"c++","sanitize":""},
            {"key":"windows2025-x64","os":"windows-2025","kind":"windows","cc":"clang","cxx":"clang++","msystem":"CLANG64","pkg":"x86_64","sanitize":""},
            {"key":"windows11-arm64","os":"windows-11-arm","kind":"windows","cc":"clang","cxx":"clang++","msystem":"CLANGARM64","pkg":"aarch64","sanitize":"SANITIZE="}
          ]'
          if [ "$BROAD" = "true" ]; then
            PLATFORMS=$(jq -cn --argjson core "$CORE" --argjson extra "$EXTRA" '$core + $extra')
          else
            PLATFORMS=$(jq -cn --argjson core "$CORE" '$core')
          fi
          if [ "$PROFILE" = "pr" ]; then
            RUN_PLATFORMS=$(jq -cn --argjson platforms "$PLATFORMS" \
              '$platforms | map(select(.key == "ubuntu-x64"))')
          elif [ "$PROFILE" = "full" ]; then
            RUN_PLATFORMS="$PLATFORMS"
          else
            echo "unknown test profile: $PROFILE" >&2
            exit 1
          fi
          SHARDS=$(jq -c \
            '[to_entries[] | {name: .key, suites: (.value | join(" "))}]' \
            .github/test-shards.json)
          echo "platforms=$PLATFORMS" >> "$GITHUB_OUTPUT"
          echo "run_platforms=$RUN_PLATFORMS" >> "$GITHUB_OUTPUT"
          echo "shards=$SHARDS" >> "$GITHUB_OUTPUT"

  build-test-runners:
    needs: setup
    name: build-runner (${{ matrix.platform.key }})
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.setup.outputs.platforms) }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install deps (Ubuntu)
        if: startsWith(matrix.platform.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        if: matrix.platform.kind == 'windows'
        with:
          msystem: ${{ matrix.platform.msystem }}
          path-type: inherit
          install: >-
            mingw-w64-clang-${{ matrix.platform.pkg }}-clang
            mingw-w64-clang-${{ matrix.platform.pkg }}-compiler-rt
            mingw-w64-clang-${{ matrix.platform.pkg }}-zlib
            make
            git

      - name: Build sanitizer runner (Unix)
        if: matrix.platform.kind == 'unix'
        run: scripts/test.sh --build-only CC=${{ matrix.platform.cc }} CXX=${{ matrix.platform.cxx }} ${{ matrix.platform.sanitize }}

      - name: Build sanitizer runner (Windows)
        if: matrix.platform.kind == 'windows'
        shell: msys2 {0}
        run: scripts/test.sh --build-only CC=${{ matrix.platform.cc }} CXX=${{ matrix.platform.cxx }} ${{ matrix.platform.sanitize }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-runner-${{ matrix.platform.key }}
          path: |
            build/c/test-runner
            build/c/test-runner.exe
          if-no-files-found: error
          retention-days: 1

  test-shards:
    needs: [setup, build-test-runners]
    name: test (${{ matrix.platform.key }}, ${{ matrix.shard.name }})
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.setup.outputs.run_platforms) }}
        shard: ${{ fromJSON(needs.setup.outputs.shards) }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install deps (Ubuntu)
        if: startsWith(matrix.platform.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        if: matrix.platform.kind == 'windows'
        with:
          msystem: ${{ matrix.platform.msystem }}
          path-type: inherit
          install: >-
            mingw-w64-clang-${{ matrix.platform.pkg }}-clang
            mingw-w64-clang-${{ matrix.platform.pkg }}-compiler-rt
            mingw-w64-clang-${{ matrix.platform.pkg }}-zlib
            make
            git

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-runner-${{ matrix.platform.key }}
          path: build/c

      - name: Run suite shard (Unix)
        if: matrix.platform.kind == 'unix'
        env:
          CBM_SKIP_PERF: ${{ inputs.skip_perf && '1' || '' }}
          CBM_TEST_SUITES: ${{ matrix.shard.suites }}
        run: |
          set +e
          scripts/test.sh --run-only CC=${{ matrix.platform.cc }} CXX=${{ matrix.platform.cxx }} 2>&1 | tee suite-output.log
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "### ${{ matrix.platform.key }} / ${{ matrix.shard.name }}"
            grep '^\[SUITE_TIMING\]' suite-output.log || true
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Run suite shard (Windows)
        if: matrix.platform.kind == 'windows'
        shell: msys2 {0}
        env:
          CBM_SKIP_PERF: ${{ inputs.skip_perf && '1' || '' }}
          CBM_TEST_SUITES: ${{ matrix.shard.suites }}
        run: |
          set +e
          scripts/test.sh --run-only CC=${{ matrix.platform.cc }} CXX=${{ matrix.platform.cxx }} 2>&1 | tee suite-output.log
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "### ${{ matrix.platform.key }} / ${{ matrix.shard.name }}"
            grep '^\[SUITE_TIMING\]' suite-output.log || true
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

  product-guards:
    if: ${{ inputs.profile == 'full' }}
    needs: setup
    name: product-guards (${{ matrix.platform.key }})
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.setup.outputs.run_platforms) }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install deps (Ubuntu)
        if: startsWith(matrix.platform.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        if: matrix.platform.kind == 'windows'
        with:
          msystem: ${{ matrix.platform.msystem }}
          path-type: inherit
          install: >-
            mingw-w64-clang-${{ matrix.platform.pkg }}-clang
            mingw-w64-clang-${{ matrix.platform.pkg }}-zlib
            make
            git

      - name: Product process and binary guards (Unix)
        if: matrix.platform.kind == 'unix'
        run: scripts/test.sh --guards-only CC=${{ matrix.platform.cc }} CXX=${{ matrix.platform.cxx }}

      - name: Product process and binary guards (Windows)
        if: matrix.platform.kind == 'windows'
        shell: msys2 {0}
        run: scripts/test.sh --guards-only CC=${{ matrix.platform.cc }} CXX=${{ matrix.platform.cxx }} ${{ matrix.platform.sanitize }}

  test-tsan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install deps (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
      - name: ThreadSanitizer tests
        run: make -f Makefile.cbm test-tsan CC=clang CXX=clang++

  test-windows-guards:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: CLANG64
          path-type: inherit
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-zlib
            make
            git

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Build product binary with embedded UI
        shell: msys2 {0}
        run: scripts/build.sh --with-ui CC=clang CXX=clang++

      - name: Windows regression guards
        shell: pwsh
        run: ./scripts/test-windows.ps1 -GuardsOnly -Binary build/c/codebase-memory-mcp.exe
