# Minimal GitHub-only release pipeline for the bogyie fork.
#
# This intentionally skips the upstream npm/PyPI/MCP Registry, attestations,
# signing, SBOM, and VirusTotal publishing jobs that require additional
# credentials/services. Publication reuses the required validation results for
# the exact main SHA, then smoke-tests the newly built release artifacts.
name: Fork Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example v0.8.1-bogyie.1)"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: fork-release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    steps:
      - name: Validate release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "fork releases must be dispatched from main (got $GITHUB_REF)" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid release version: $VERSION" >&2
            exit 1
          fi
      - name: Require successful validation for this exact commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          RUNS=$(gh api \
            "repos/$REPO/actions/workflows/main.yml/runs?head_sha=$SHA&event=push&per_page=10")
          echo "$RUNS" | jq -e --arg sha "$SHA" '
            .workflow_runs
            | any(.head_sha == $sha and .event == "push" and .conclusion == "success")
          ' >/dev/null || {
            echo "release blocked: Main validation has not succeeded on $SHA" >&2
            exit 1
          }
          echo "release validation passed for $SHA"

  build:
    needs: validate
    # Reusable workflows cannot elevate permissions beyond their caller.
    # _build.yml declares these scopes because it can optionally attest
    # artifacts, so the caller must grant them even when attest=false.
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ inputs.version }}
      attest: false

  smoke:
    needs: build
    uses: ./.github/workflows/_smoke.yml
    with:
      broad_platforms: false

  publish:
    needs: [build, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Generate checksums
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid release version: $VERSION" >&2
            exit 1
          fi
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(
            "$VERSION"
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "$VERSION"
            --generate-notes
          )
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          else
            args+=(--latest)
          fi
          gh release create "${args[@]}" *.tar.gz *.zip checksums.txt
